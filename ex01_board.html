<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        table {
            width: 400px;
            border-collapse: collapse;
            background-color: whitesmoke;
        }

        .step-header{
            height: 50px;
            background-color: gray;
            color: black;
            font-weight: bold;
            text-align: left;
            padding-left: 10px;
        }
        tr{
            height: 35px;
        }
    
        td{
            text-align: right;
            padding-right: 10px;
        }

        input[type="text"], input[type="password"],input[type="Date"] {
            width: 180px;
        }
        .center{
            text-align: center;
        }
    </style>
</head>
<body>
        <table >
            <tr>
                <td colspan="2" class="step-header">Steep1 : 아이디/비번 입력</td>
            </tr>
            <tr>
                <td>아이디 :</td>
                <td style="text-align: left;"> <input type="text"></td>
            </tr>
            <tr>
                <td>비밀번호 :</td>
                <td style="text-align: left;"> <input type="password"></td>
             </tr>
             <tr>
                <td>비밀번호 확인 :</td>
                <td style="text-align: left;"> <input type="password"></td>
             </tr>
             <tr>
                <td colspan="2" class="step-header">Steep2 : 개인정보</td>
             </tr>
             <tr>
                <td>성별 :</td>
                <td style="text-align: left;"> 
                    남<input type="radio" name="gender">
                    여<input type="radio" name="gender">
                </td>
             </tr>
                <tr>
                    <td>혈액형 :</td>
                    <td style="text-align: left;"> 
                        <select>
                            <option value="A">A형</option>
                            <option value="B">B형</option>
                            <option value="O">O형</option>
                            <option value="AB">AB형</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>생일 :</td>
                    <td style="text-align: left;"> 
                        <input type="Date">
                    </td>
                </tr>
                <tr>
                    <td colspan="2" class="step-header">Steep3 : 선호도</td>
                </tr>
                <tr>
                    <td>취미 :</td>
                    <td style="text-align: left;"> 
                        축구<input type="checkbox">
                        야구<input type="checkbox">
                        농구<input type="checkbox">
                        
                </tr>
                <tr>
                    <td> 좋아하는 색깔 :</td>
                    <td style="text-align: left;"> 
                        <input type="color">
                    </td>
                </tr>
                <tr>
                    <td colspan="2" class="step-header">Steep4 : 적고 싶은 말</td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <textarea rows="5" cols="60"></textarea>
                    </td>
                </tr>
                    <tr>
                        <td colspan="2" class="center">
                            <input type="submit" value="제출">
                            <input type="reset" value="초기화">
                        </td>
                    </tr>
            </table>    
</body>
</html>
